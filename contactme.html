<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website</title>
    <style>
      body {
        background-color: rgb(205, 230, 242);
      }
      .nav {
        background-color: beige;

      }
      .nav a {
        float: left;
        color: cornflowerblue;
        text-align: center;
        padding: 20px 137px;
        text-decoration: none;
        font-size: 25px;
      }
      .nav a:hover {
        background-color: cornflowerblue;
        color: beige;
      }
      h1 {
        color: cornflowerblue;
        font-family: "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
        font-size: 40px;
        text-align: center;
        margin: 45px;
      }
      #form1 {
        color: cadetblue;
        font-size: 30px;
        text-align: center;
      }
      #form2 {
        color: cadetblue;
        font-size: 30px;
        text-align: center;
      }
      #form3 {
        color: cadetblue;
        font-size: 30px;
        text-align: center;
      }
      #form4 {
        color: cadetblue;
        font-size: 30px;
        text-align: center;
      }
      textarea {
        background-color: beige;
      }
      input {
        color: cadetblue;
        font-size: 30px;
        background-color: beige;
      }
    </style>
  </head>
  <body>
    <div class="nav">
      <a class="active" href="index.html">Home</a>
      <a href="aboutme.html">About</a>
      <a href="resume.html">Resume</a>
      <a href="contactme.html">Contact Me</a>
    </div>
    <h1>Contact Form</h1>
    <form id="form1">
      <label for="name">Name</label><br />
      <input type="text" id="name" name="name" /><br />
    </form>
    <form id="form2">
      <label for="email">Email</label><br />
      <input type="email" id="email" name="email" /><br />
    </form>
    <form id="form3">
      <label for="subject">Subject</label><br />
      <input type="text" id="subject" name="subject" /><br />
    </form>
    <form id="form4">
      <label for="message">Message</label><br />
      <textarea
        id="message"
        message="message"
        name="message"
        rows="4"
        cols="30"
      ></textarea
      ><br />
      <input type="submit" />
    </form>
  </body>
</html>
